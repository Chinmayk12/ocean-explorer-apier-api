spring.application.name=ocean-explorer-api

# Server Configuration
server.port=8080

## ========================
## Actuator Configuration
## ========================
## Expose health and info endpoints via HTTP
#management.endpoints.web.exposure.include=health,info
#
## Show full health details (UP/DOWN with component status)
#management.endpoint.health.show-details=always

# Application info for /actuator/info endpoint
management.info.env.enabled=true
info.app.name=Ocean Explorer API
info.app.description=REST API to control a submersible probe exploring the ocean floor
info.app.version=0.0.1-SNAPSHOT
info.app.java-version=${java.version}

# ========================
# Logging Configuration
# ========================
logging.level.com.NatWest.ChinmayKarodpati=DEBUG
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

